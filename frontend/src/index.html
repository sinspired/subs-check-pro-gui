<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subs Check Pro</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>

<div class="page" id="loginPage">
  <div class="card">

    <!-- 头部 -->
    <div class="hdr">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="18" fill="var(--accent)"/>
        <path d="M10 18h16M18 10v16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="6" stroke="#fff" stroke-width="2"/>
      </svg>
      <div class="hdr-text">
        <div class="name">Subs Check <span class="pro">Pro⁺</span></div>
        <div class="sub">管理界面</div>
      </div>
      <button class="icon-btn theme-btn" id="themeBtn" title="切换主题">
        <svg id="iDark" width="17" height="17" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="iLight" width="17" height="17" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>

    <!-- Issue #1：首次运行 banner（简化版） -->
    <div class="hint first-run" id="firstRunBanner" style="display:none">
      🎉 首次运行 — 配置文件已创建：<code id="configPathVal">config/config.yaml</code>
    </div>

    <!-- Issue #3：端口冲突提示与编辑区 -->
    <div class="hint warn" id="portConflictBanner" style="display:none">
      <strong>⚠️ 端口冲突</strong> — 以下端口已被占用，请修改后重新启动服务：
      <div class="port-edit-row" id="portEditRow" style="margin-top:8px">
        <div class="port-edit-cell">
          <label class="port-lbl">HTTP 端口</label>
          <input class="port-input" id="httpPortInput" type="number" min="1" max="65535" />
        </div>
        <div class="port-edit-cell" id="subStorePortCell" style="display:none">
          <label class="port-lbl">Sub-Store 端口</label>
          <input class="port-input" id="subStorePortInput" type="number" min="1" max="65535" />
        </div>
      </div>
      <button class="btn-small" id="applyPortBtn" style="margin-top:8px">应用端口并重试</button>
    </div>

    <!-- 加载状态 -->
    <div id="loadingState" class="state-box">
      <div class="spinner"></div>
      <span>正在加载应用信息…</span>
    </div>

    <!-- Issue #1：随机 key 提示 -->
    <div class="hint warn" id="randomKeyHint" style="display:none">
      ⚠️ 当前密钥随机生成，重启后将变更。建议在 <code>config.yaml</code> 中固定 <code>api-key</code>。
    </div>

    <!-- API Key 区域 -->
    <div id="keySection" style="display:none">
      <div class="label">API 密钥</div>
      <div class="key-wrap">
        <span class="key-text blur" id="keyText" title="点击显示/隐藏"></span>
        <button class="icon-btn" id="revealBtn" title="显示/隐藏">
          <svg id="iEyeOff" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
              a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
              a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg id="iEyeOn" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <button class="icon-btn" id="copyBtn" title="复制密钥">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>

      <!-- 端口信息 -->
      <div class="info-row">
        <div class="info-cell">
          <div class="lbl">HTTP 端口</div>
          <div class="val" id="portVal">—</div>
        </div>
        <div class="info-cell">
          <div class="lbl">Sub-Store</div>
          <div class="val" id="subStoreVal">—</div>
        </div>
      </div>

      <!-- Issue #1：记住密钥选项 -->
      <label class="remember-row">
        <input type="checkbox" id="rememberChk" />
        <span>记住密钥（下次自动登录）</span>
      </label>

      <button class="btn-enter" id="enterBtn">进入管理界面 →</button>
    </div>

    <!-- Issue #2：选择配置文件 -->
    <div id="configSection" style="display:none">
      <button class="btn-cfg" id="selectCfgBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        选择其他配置文件…
      </button>
    </div>

    <!-- Issue #2：自定义配置密码确认框 -->
    <div class="password-confirm" id="passwordConfirm" style="display:none">
      <div class="label" style="margin-bottom:8px">
        请输入该配置文件的 API 密钥：
      </div>
      <div class="pw-row">
        <input class="pw-input" type="password" id="cfgKeyInput" placeholder="API 密钥" />
        <button class="btn-small" id="confirmKeyBtn">确认进入</button>
      </div>
      <div class="cfg-path-hint" id="cfgPathHint"></div>
    </div>

  </div>
</div>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>

<script src="main.js"></script>
</body>
</html>
