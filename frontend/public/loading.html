<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在加载…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f2f4f6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
    color: #111827;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #111317; color: #e5e7eb; }
    .ring { border-color: rgba(255,255,255,0.08); border-top-color: #0ea5a0; }
    .label { color: #9ca3af; }
    .logo-icon { opacity: 0.7; }
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* 双环 spinner，外环慢、内环快 */
  .rings {
    position: relative;
    width: 52px;
    height: 52px;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid rgba(0,0,0,0.07);
    border-top-color: #0ea5a0;
    animation: spin 1s linear infinite;
  }

  .ring-inner {
    inset: 10px;
    border-width: 2px;
    border-top-color: #0ea5a0;
    opacity: 0.45;
    animation-duration: 0.65s;
    animation-direction: reverse;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* 目标域名 */
  .label {
    font-size: 12px;
    color: #6b7280;
    letter-spacing: 0.01em;
    max-width: 320px;
    text-align: center;
    word-break: break-all;
    opacity: 0;
    animation: fadeIn 0.4s ease 0.15s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="rings">
    <div class="ring"></div>
    <div class="ring ring-inner"></div>
  </div>
  <div class="label" id="lbl">正在打开链接…</div>
</div>
<script>
(function () {
  // 从 URL hash 读取目标地址：loading.html#https://...
  var target = decodeURIComponent(location.hash.slice(1));
  if (!target || !/^https?:\/\//.test(target)) return;

  // 显示目标域名，让用户知道在加载什么
  try {
    var host = new URL(target).hostname;
    document.getElementById('lbl').textContent = host;
  } catch (_) {}

  // 直接跳转：WebView 初始化完毕后立即发起请求
  // 用 replace 避免用户按回退键回到此 loading 页
  window.location.replace(target);
})();
</script>
</body>
</html>
