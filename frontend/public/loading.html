<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在加载…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f2f4f6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
    color: #111827;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #111317; color: #e5e7eb; }
    .ring { border-color: rgba(255,255,255,0.08); border-top-color: #0ea5a0; }
    .label { color: #9ca3af; }
  }

  /* data-theme 显式主题（优先级高于系统媒体查询，与 Wails 登录窗口保持同步）*/
  [data-theme="dark"] body {
    background: #111317;
    color: #e5e7eb;
  }
  [data-theme="dark"] .ring {
    border-color: rgba(255,255,255,0.08);
    border-top-color: #0ea5a0;
  }
  [data-theme="dark"] .label { color: #9ca3af; }

  [data-theme="light"] body {
    background: #f2f4f6;
    color: #111827;
  }
  [data-theme="light"] .ring {
    border-color: rgba(0,0,0,0.07);
    border-top-color: #0ea5a0;
  }
  [data-theme="light"] .label { color: #6b7280; }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* 双环 spinner，外环慢、内环快 */
  .rings {
    position: relative;
    width: 52px;
    height: 52px;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid rgba(0,0,0,0.07);
    border-top-color: #0ea5a0;
    animation: spin 1s linear infinite;
  }

  .ring-inner {
    inset: 10px;
    border-width: 2px;
    border-top-color: #0ea5a0;
    opacity: 0.45;
    animation-duration: 0.65s;
    animation-direction: reverse;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* 目标域名 */
  .label {
    font-size: 12px;
    color: #6b7280;
    letter-spacing: 0.01em;
    max-width: 320px;
    text-align: center;
    word-break: break-all;
    opacity: 0;
    animation: fadeIn 0.4s ease 0.15s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
<script>
// 同步 Wails 登录窗口的用户主题设置。
// loading.html 由 Wails 资产服务器提供（wails://localhost 同 origin），
// 可以直接读取与登录窗口共享的 localStorage（key: scp_theme）。
// 若未找到存储值，则回退到系统 prefers-color-scheme（CSS 媒体查询已兜底）。
(function () {
  try {
    var t = localStorage.getItem('scp_theme');
    if (t === 'dark' || t === 'light') {
      document.documentElement.setAttribute('data-theme', t);
    }
  } catch (e) { /* 隐私模式或 storage 不可用时静默忽略 */ }
})();
</script>
</head>
<body>
<div class="wrap">
  <div class="rings">
    <div class="ring"></div>
    <div class="ring ring-inner"></div>
  </div>
  <div class="label" id="lbl">正在打开链接…</div>
</div>
<script>
(function () {
  var hash = location.hash.slice(1);
  if (!hash) return;
  var target = decodeURIComponent(hash);

  try {
    // 检查是否是 proxy.domain/https://... 的形式
    var proxyMatch = target.match(/^https?:\/\/[^/]+\/(https?:\/\/.+)$/);
    var realUrl = proxyMatch ? proxyMatch[1] : target;

    if (!/^https?:\/\//.test(realUrl)) return;

    var host = new URL(realUrl).hostname;
    document.getElementById('lbl').textContent = host;
  } catch (_) {}
})();

</script>
</body>
</html>
