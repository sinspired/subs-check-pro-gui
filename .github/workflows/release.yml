name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            task: windows:build
            artifact: subs-check-pro-gui-windows-amd64

          - os: macos-15-intel
            arch: amd64
            task: darwin:build
            artifact: subs-check-pro-gui-darwin-amd64

          - os: macos-14
            arch: arm64
            task: darwin:build
            artifact: subs-check-pro-gui-darwin-arm64

          - os: ubuntu-24.04
            arch: amd64
            task: linux:build
            artifact: subs-check-pro-gui-linux-amd64

          - os: ubuntu-24.04-arm
            arch: arm64
            task: linux:build
            artifact: subs-check-pro-gui-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.98

      - name: Install Task CLI and pnpm
        run: npm install -g @go-task/cli pnpm

      - name: Build
        run: task ${{ matrix.task }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 重命名为带平台后缀，避免 release job 里同名覆盖
      - name: Rename artifacts
        shell: bash
        run: |
          cd bin
          for f in *; do
            # 跳过已经带后缀的文件
            case "$f" in
              *.exe)
                mv "$f" "subs-check-pro-gui-${{ matrix.artifact }}.exe"
                ;;
              *)
                mv "$f" "subs-check-pro-gui-${{ matrix.artifact }}"
                ;;
            esac
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 不用 merge-multiple，每个 artifact 下载到独立子目录
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          # 把各子目录中的文件平铺到 release-files/
          find artifacts/ -type f -exec mv {} release-files/ \;
          echo "=== Release files ==="
          ls -lah release-files/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: release-files/*
          generate_release_notes: true

  notify:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'notes<<EOF'
            gh release view "${{ github.ref_name }}" --json body -q .body
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Send notifications
        uses: sinspired/multi-release-notify@v1
        with:
          summary: >-
            🎉 linux 和 mac 可能存在问题，请及时反馈
          release_notes: ${{ steps.release.outputs.notes }}
          email_url: ${{ secrets.EMAIL_APPRISE_URL }}
          telegram_url: ${{ secrets.TELEGRAM_APPRISE_URL }}
          slack_url: ${{ secrets.DINGTALK_APPRISE_URL }}
          bark_url: ${{ secrets.BARK_APPRISE_URL }}
          urls: |
            ntfy://subs-check-pro