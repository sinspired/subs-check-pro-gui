name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

# 产物命名规范（用户可见架构名统一用 x64/arm64/x86）：
#   subs-check-pro-gui_<goos>_<arch>[_variant][.ext]
# 示例：
#   subs-check-pro-gui_windows_x64.exe
#   subs-check-pro-gui_windows_x64_setup.exe
#   subs-check-pro-gui_darwin_arm64.app.tar.gz
#   subs-check-pro-gui_darwin_arm64.dmg
#   subs-check-pro-gui_linux_x64.deb
jobs:
  # 1. 生成 Changelog
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.cliff.outputs.content }}
      core_version: ${{ steps.core.outputs.version }}
      core_commit: ${{ steps.core.outputs.commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Changelog with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # core_version 直接从 go.mod 读取
      - name: Resolve subs-check-pro core version from go.mod
        id: core
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 go.mod 精确解析已锁定的版本号（格式：v2.6.2）
          CORE_VERSION=$(grep 'github.com/sinspired/subs-check-pro/v2' go.mod \
            | awk '{print $2}' | tr -d '[:space:]')

          if [ -z "${CORE_VERSION}" ]; then
            echo "⚠️  subs-check-pro/v2 not found in go.mod, falling back to dev"
            CORE_VERSION="dev"
            CORE_COMMIT="unknown"
          else
            echo "📦 core version from go.mod: ${CORE_VERSION}"
            # 通过指定 tag 查 commit SHA（不依赖"最新 release"，确定性）
            # 先尝试轻量 tag（ref/tags），再尝试 annotated tag（object.sha）
            SHA_RAW=$(gh api "repos/sinspired/subs-check-pro/git/ref/tags/${CORE_VERSION}" \
              -q '.object.sha' 2>/dev/null || echo "")

            if [ -z "${SHA_RAW}" ]; then
              # tag 不存在或网络失败，降级
              CORE_COMMIT="unknown"
            else
              # annotated tag 的 object.sha 指向 tag 对象而非 commit，需再查一层
              OBJ_TYPE=$(gh api "repos/sinspired/subs-check-pro/git/ref/tags/${CORE_VERSION}" \
                -q '.object.type' 2>/dev/null || echo "commit")
              if [ "${OBJ_TYPE}" = "tag" ]; then
                SHA_RAW=$(gh api "repos/sinspired/subs-check-pro/git/tags/${SHA_RAW}" \
                  -q '.object.sha' 2>/dev/null || echo "${SHA_RAW}")
              fi
              CORE_COMMIT="${SHA_RAW:0:7}"
            fi
          fi

          echo "version=${CORE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${CORE_COMMIT}"   >> "$GITHUB_OUTPUT"
          echo "core_version=${CORE_VERSION}  core_commit=${CORE_COMMIT}"

  # 2. 矩阵构建各平台产物
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.arch }})
    needs: changelog # 等 changelog 生成完再开始
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows amd64（裸 exe + NSIS installer）──
          - os: windows-latest
            arch: amd64
            goos: windows

          # ── macOS Intel（.app.tar.gz）──
          - os: macos-15-intel
            arch: amd64
            goos: darwin

          # ── macOS Apple Silicon（.app.tar.gz）──
          - os: macos-14
            arch: arm64
            goos: darwin

          # ── Linux amd64（裸二进制 + .deb）──
          - os: ubuntu-24.04
            arch: amd64
            goos: linux

          # ── Linux arm64（裸二进制 + .deb）──
          - os: ubuntu-24.04-arm
            arch: arm64
            goos: linux

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: subs-check-pro-gui
      # github.ref_name = tag name on tag push, branch name on workflow_dispatch
      VERSION: ${{ github.ref_name }}
      # 从 changelog job 获取已解析好的内核版本，避免 Taskfile 重复网络拉取
      CORE_VERSION: ${{ needs.changelog.outputs.core_version }}
      CORE_COMMIT: ${{ needs.changelog.outputs.core_commit }}
      # GUI 自身版本；tag push 时即 tag name，workflow_dispatch 时 Taskfile 会 fallback 到 git describe
      GUI_VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # ── Linux：GTK4 / WebKitGTK 依赖 ──
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev

      # ── Windows：NSIS 打包器（用于生成安装包）──
      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          # choco 安装后不刷新当前 shell 的 PATH，需手动追加
          $nsisPath = "C:\Program Files (x86)\NSIS"
          echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Added NSIS to PATH: $nsisPath"

      # macOS：安装 create-dmg
      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task CLI and pnpm
        run: npm install -g @go-task/cli pnpm

      # Windows：先 build → 再 package（NSIS）
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: task windows:build
        env:
          ARCH: ${{ matrix.arch }}

      - name: Package Windows (NSIS installer)
        if: runner.os == 'Windows'
        # task windows:package 调用 create:nsis:installer
        # 输出：bin/subs-check-pro-gui-amd64-installer.exe
        run: task windows:package
        env:
          ARCH: ${{ matrix.arch }}

      # macOS：先打 .app bundle，再生成 DMG
      - name: Package macOS (.app bundle)
        if: runner.os == 'macOS'
        # task darwin:package 调用 create:app:bundle
        # 输出：bin/subs-check-pro-gui.app/
        run: task darwin:package
        env:
          ARCH: ${{ matrix.arch }}

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: task darwin:create:dmg
        env:
          ARCH: ${{ matrix.arch }}

      # Linux：先 build → 再生成 .deb
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: task linux:build
        env:
          ARCH: ${{ matrix.arch }}

      - name: Package Linux (.deb)
        if: runner.os == 'Linux'
        run: task linux:create:deb
        env:
          ARCH: ${{ matrix.arch }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_name != '' && github.ref_name || 'dev' }}

      # 统一整理产物，重命名为规范格式
      - name: Collect and Rename Artifacts
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist

          # 命名前缀：APP_NAME_GOOS_ARCH
          # 用户可见架构名统一为 x64/arm64/x86，
          # Go 内部 GOARCH（amd64 等）保持不变，仅在此处做"展示名"映射
          case "${GOARCH}" in
            amd64) ARCH_NAME="x64" ;;
            arm64) ARCH_NAME="arm64" ;;
            386)   ARCH_NAME="x86" ;;
            *)     ARCH_NAME="${GOARCH}" ;;
          esac
          PREFIX="${APP_NAME}_${GOOS}_${ARCH_NAME}"

          case "${GOOS}" in

            windows)
              # 1. 便携版（裸二进制）
              cp "bin/${APP_NAME}.exe" "dist/${PREFIX}.exe"

              # 2. NSIS 安装包（OutFile 输出到 bin/<name>-<arch>-installer.exe）
              NSIS_SRC="bin/${APP_NAME}-${GOARCH}-installer.exe"
              if [ -f "${NSIS_SRC}" ]; then
                cp "${NSIS_SRC}" "dist/${PREFIX}-setup.exe"
              else
                echo "⚠️  NSIS installer not found at ${NSIS_SRC}, skipping"
              fi
              ;;

            darwin)
              # 用 -C 指定源目录，避免 cd 改变工作目录导致后续 ls dist/ 失败
              tar czf "dist/${PREFIX}.app.tar.gz" -C bin "${APP_NAME}.app"

              # DMG（推荐，拖拽安装体验）
              DMG_SRC="bin/${APP_NAME}.dmg"
              if [ -f "${DMG_SRC}" ]; then
                cp "${DMG_SRC}" "dist/${PREFIX}.dmg"
              else
                echo "⚠️  DMG not found at ${DMG_SRC}, skipping"
              fi
              ;;

            linux)
              # 1. 裸二进制（便携版）
              cp "bin/${APP_NAME}" "dist/${PREFIX}"

              # 2. .deb 包
              DEB_SRC=$(ls bin/*.deb 2>/dev/null | head -1)
              if [ -n "${DEB_SRC}" ]; then
                cp "${DEB_SRC}" "dist/${PREFIX}.deb"
              else
                echo "⚠️  .deb not found in bin/, skipping"
              fi
              ;;

          esac

          echo "=== dist/ contents ==="
          ls -lah dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  # 3. 汇总产物 → 创建 GitHub Release
  release:
    name: Create GitHub Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # merge-multiple 把各 artifact 子目录打平到同一目录
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release files ==="
          ls -lah dist/

      # ── 生成 SHA256SUMS（供 Wails updater ChecksumAsset 验证）──
      # 文件格式：<sha256sum>  <filename>，与 sha256sum / shasum -a 256 输出一致
      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS
          else
            # macOS runner 使用 shasum
            shasum -a 256 * > SHA256SUMS
          fi
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 使用 git-cliff 生成的 changelog 作为 release body
          body: ${{ needs.changelog.outputs.content }}
          files: dist/*

  # 4. 发送通知
  notify:
    name: Send Release Notifications
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'notes<<EOF'
            gh release view "${{ github.ref_name }}" --json body -q .body
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Send notifications
        uses: sinspired/multi-release-notify@v1
        with:
          summary: >-
            跨平台现代GUI客户端，基于 [Subs Check PRO](https://github.com/sinspired/subs-check-pro) 内核，本地原生界面 + WebUI，可远程管理，后台运行，支持开机自启，Windows 小白可用。
          release_notes: ${{ steps.release.outputs.notes }}
          email_url: ${{ secrets.EMAIL_APPRISE_URL }}
          telegram_url: ${{ secrets.TELEGRAM_APPRISE_URL }}
          urls: |
            ntfy://subs-check-pro?optional=yes&retry=3&wait=5