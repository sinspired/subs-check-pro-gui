name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

  # 产物命名规范：
#   subs-check-pro-gui_<tag>_<goos>_<arch>[.ext]
# 示例：
#   subs-check-pro-gui_v2.5.6_windows_amd64.exe    
jobs:
  # 1. 生成 Changelog
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.cliff.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 必须获取完整历史，cliff 才能对比 tag

      - name: Generate Changelog with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md # 同时写入文件（供后续步骤引用）
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. 矩阵构建各平台产物并按照规范重命名
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.arch }})
    needs: changelog # 等 changelog 生成完再开始（可选，避免冗余）
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows amd64（裸 exe + NSIS installer）──
          - os: windows-latest
            arch: amd64
            goos: windows

          # ── macOS Intel（.app.tar.gz）──
          - os: macos-15-intel
            arch: amd64
            goos: darwin

          # ── macOS Apple Silicon（.app.tar.gz）──
          - os: macos-14
            arch: arm64
            goos: darwin

          # ── Linux amd64（裸二进制 + .deb）──
          - os: ubuntu-24.04
            arch: amd64
            goos: linux

          # ── Linux arm64（裸二进制 + .deb）──
          - os: ubuntu-24.04-arm
            arch: arm64
            goos: linux

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: subs-check-pro-gui
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # ── Linux：GTK4 / WebKitGTK 依赖 ──
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev

      # ── Windows：NSIS 打包器（用于生成安装包）──
      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          # choco 安装后不刷新当前 shell 的 PATH，需手动追加
          $nsisPath = "C:\Program Files (x86)\NSIS"
          echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Added NSIS to PATH: $nsisPath"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install Task CLI and pnpm
        run: npm install -g @go-task/cli pnpm

      # ──────────────────────────────────────────
      # Windows：先 build → 再 package（NSIS）
      # ──────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: task windows:build
        env:
          ARCH: ${{ matrix.arch }}

      - name: Package Windows (NSIS installer)
        if: runner.os == 'Windows'
        # task windows:package 调用 create:nsis:installer
        # 输出：bin/subs-check-pro-gui-amd64-installer.exe
        run: task windows:package
        env:
          ARCH: ${{ matrix.arch }}

      # ──────────────────────────────────────────
      # macOS：package 已包含 build + .app bundle
      # ──────────────────────────────────────────
      - name: Package macOS (.app bundle)
        if: runner.os == 'macOS'
        # task darwin:package 调用 create:app:bundle
        # 输出：bin/subs-check-pro-gui.app/
        run: task darwin:package
        env:
          ARCH: ${{ matrix.arch }}

      # ──────────────────────────────────────────
      # Linux：先 build → 再生成 .deb
      # ──────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: task linux:build
        env:
          ARCH: ${{ matrix.arch }}

      - name: Package Linux (.deb)
        if: runner.os == 'Linux'
        # task linux:create:deb 使用 wails3 tool package（内置 nfpm）
        # 输出：bin/subs-check-pro-gui_<version>_<arch>.deb
        # 注意：nfpm.yaml 中 version 字段需改为 ${VERSION}（见说明）
        run: task linux:create:deb
        env:
          ARCH: ${{ matrix.arch }}
          GOARCH: ${{ matrix.arch }}
          # nfpm.yaml 用 ${VERSION} 时读取此变量（去掉 v 前缀）
          VERSION: ${{ github.ref_name != '' && github.ref_name || 'dev' }}

      # ──────────────────────────────────────────
      # 统一整理产物，重命名为规范格式
      # ──────────────────────────────────────────
      - name: Collect and Rename Artifacts
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          # 命名前缀：APP_NAME_GOOS_ARCH
          PREFIX="${APP_NAME}_${GOOS}_${GOARCH}"

          case "${GOOS}" in

            windows)
              # 1. 便携版（裸二进制）
              cp "bin/${APP_NAME}.exe" "dist/${PREFIX}.exe"

              # 2. NSIS 安装包（OutFile 输出到 bin/<name>-<arch>-installer.exe）
              NSIS_SRC="bin/${APP_NAME}-${GOARCH}-installer.exe"
              if [ -f "${NSIS_SRC}" ]; then
                cp "${NSIS_SRC}" "dist/${PREFIX}-setup.exe"
              else
                echo "⚠️  NSIS installer not found at ${NSIS_SRC}, skipping"
              fi
              ;;

            darwin)
              # 用 -C 指定源目录，避免 cd 改变工作目录导致后续 ls dist/ 失败
              tar czf "dist/${PREFIX}.app.tar.gz" -C bin "${APP_NAME}.app"
              ;;

            linux)
              # 1. 裸二进制（便携版）
              cp "bin/${APP_NAME}" "dist/${PREFIX}"

              # 2. .deb 包（nfpm 生成的默认名如 subs-check-pro-gui_2.5.6_amd64.deb）
              DEB_SRC=$(ls bin/*.deb 2>/dev/null | head -1)
              if [ -n "${DEB_SRC}" ]; then
                cp "${DEB_SRC}" "dist/${PREFIX}.deb"
              else
                echo "⚠️  .deb not found in bin/, skipping"
              fi
              ;;

          esac

          echo "=== dist/ contents ==="
          ls -lah dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  # ══════════════════════════════════════════════
  # Job 3: 汇总产物 → 创建 GitHub Release
  # ══════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # merge-multiple 把各 artifact 子目录打平到同一目录
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release files ==="
          ls -lah dist/

      # ── 生成 SHA256SUMS（供 Wails updater ChecksumAsset 验证）──
      # 文件格式：<sha256sum>  <filename>，与 sha256sum / shasum -a 256 输出一致
      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS
          else
            # macOS runner 使用 shasum
            shasum -a 256 * > SHA256SUMS
          fi
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          # 使用 git-cliff 生成的 changelog 作为 release body
          body: ${{ needs.changelog.outputs.content }}
          # 不再使用 generate_release_notes: true（只会产生"Full Changelog"链接）
          files: dist/*

  # ══════════════════════════════════════════════
  # Job 4: 发送通知
  # ══════════════════════════════════════════════
  notify:
    name: Send Release Notifications
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'notes<<EOF'
            gh release view "${{ github.ref_name }}" --json body -q .body
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Send notifications
        uses: sinspired/multi-release-notify@v1
        with:
          summary: >-
            🎉 linux 和 mac 可能存在问题，请及时反馈
          release_notes: ${{ steps.release.outputs.notes }}
          email_url: ${{ secrets.EMAIL_APPRISE_URL }}
          telegram_url: ${{ secrets.TELEGRAM_APPRISE_URL }}
          slack_url: ${{ secrets.DINGTALK_APPRISE_URL }}
          bark_url: ${{ secrets.BARK_APPRISE_URL }}
          urls: |
            ntfy://subs-check-pro
